name: "aic_pipeline"
version: "1.0.0"
config-version: 2

profile: "aic_pipeline"

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
