target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  aic_pipeline:
    bronze:
      +materialized: view
      +schema: bronze

    silver:
      +materialized: table
      +schema: silver

    gold:
      +materialized: table
      +schema: gold